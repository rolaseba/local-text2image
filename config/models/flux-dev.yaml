# FLUX.1-dev Model Constraints
# Reference: https://huggingface.co/black-forest-labs/FLUX.1-dev

min_vram_gb: 8
recommended_vram_gb: 16
model_size_gb: 12

# Allowed ranges for validation
constraints:
  width:
    min: 256
    max: 2048
  height:
    min: 256
    max: 2048
  num_inference_steps:
    min: 1
    max: 100
  guidance_scale:
    min: 1.0
    max: 20.0
